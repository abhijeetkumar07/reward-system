
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
<h1 class="text-2xl mb-4">Dashboard</h1>
<div id="user"></div>
<input id="attendance" placeholder="Attendance" class="border p-2"><br>
<input id="performance" placeholder="Performance" class="border p-2"><br>
<button onclick="update()" class="bg-green-500 text-white p-2 mt-2">Update</button>

<script>
const API="http://localhost:5000/api/users";
const user=JSON.parse(localStorage.getItem("user"));
document.getElementById("user").innerHTML=`${user.name} | ${user.company}`;

function update(){
fetch(API+"/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:user._id,attendance:attendance.value,performance:performance.value})})
.then(res=>res.json()).then(data=>alert("Updated"));
}
</script>
</body>
</html>
